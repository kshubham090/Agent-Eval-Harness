name: Eval

on:
  push:
    branches: [master]
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .[dev]

      - name: Unit tests
        run: pytest -q

      # The gate: re-run the eval and exit 1 if any metric drops more than
      # the threshold below the committed baseline.
      - name: Regression gate
        run: |
          python -m harness eval \
            --dataset datasets/examples/simple_qa.jsonl \
            --agent examples/stub_agent.py \
            --scorers exact \
            --compare-baseline ci \
            --threshold 0.05
